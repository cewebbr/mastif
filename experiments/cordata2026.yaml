experiment:
  name: "Cordata 2026"
  description: "Test how agents retrieve and use open data from Brazilian research repositories."

temperature: 0.7 # Model temperature setting
max_tokens: 1024 # Max tokens per request
max_steps: 3 # Max research iterations per agent workflow
requests_soft_limit: 1000 # Requires user confirmation if exceeded
test_mode: "standard"  # Options: "mind2web", "standard"

# Any model ID listed here must be available on HuggingFace or OpenAI
# IMPORTANT: If tool use is expected in the tasks, make sure to use models that support it (e.g., DeepSeek, GPT-4o, etc.)
models:
  # - "gpt-4o"
  # - "meta-llama/Llama-3.3-70B-Instruct"
  # - "meta-llama/Llama-4-Scout-17B-16E-Instruct"
  - "deepseek-ai/DeepSeek-V3.2"  
  - "openai/gpt-oss-120b"
  
# ====== Used only in MIND2WEB test mode ====== 
judge_model: "gpt-4o"
# judge_model: "gpt-4o-mini"
# ============================================= 

protocols:
  - "STANDARD"
  # - "MCP"
  # - "A2A"
  # - "ACP"

frameworks:
  # - "CrewAI"
  # - "Smolagents"
  # - "LangChain"
  - "LangGraph"
  # - "LlamaIndex"
  # - "SemanticKernel"

# ====== Used only in MIND2WEB test mode ====== 
# mind2web_num_tasks: 10 # Set to 2350 to run all tasks from the benchmark
# ============================================= 

# ====== Used only in STANDARD test mode ======
prompt_template: |
  # ROLE
  You are a data scientist expert in research metadata analysis and open data.

  # TASK
  Your task is to determine whether the Brazilian academic work described below makes use of publicly available datasets in its analysis.

  ## DEFINITION
  For this task, consider that a work "uses publicly available datasets" if it analyzes data that can be accessed online by the public without special authorization, such as:
  - Government or official statistics (e.g., IBGE, INEP, World Bank, WHO, and DATASUS);
  - Open government data portals (e.g., Portal Brasileiro de Dados Abertos, Geosampa);
  - Public administrative records;
  - Datasets made available on the Web by NGOs (e.g., Wikidata);
  - Open scientific, academic or environmental datasets;
  - Open satellite or geospatial data (e.g., Prodes, Landsat, Sentinel, OpenStreetMap).

  Do NOT consider as publicly available datasets:
  - Data collected exclusively via surveys, interviews, experiments, or fieldwork;
  - Proprietary, commercial, or restricted datasets;
  - Private institutional databases;
  - Publicly available documents that are not datasets (e.g., research papers on arXiv, government reports, news articles);
  - Works that study, discuss, or evaluate "open data" policies, platforms, or initiatives without actually using open datasets in their analysis.

  ## EXAMPLES
  - A few examples of publicly available datasets: %(examples_datasets)s
  - A few examples of organizations that publish datasets on the Web: %(examples_data_providers)s

  ## INSTRUCTIONS
  - Base your decision ONLY on the information provided (title, abstract, and keywords).
  - Focus on whether the work USES public data, not whether it DISCUSSES open data.
  - When in doubt if the work uses publicly available data or not, take your best guess based on the information provided.

  ## OUTPUT FORMAT
  Respond with only one of the two options: "Uses public data" or "Does not use public data". Do not provide any other output apart from these two possible answers.

  ## LANGUAGE
  The input text will be in Brazilian Portuguese or English.

  # ACADEMIC WORK DESCRIPTION
  {task}

  # TASK 
  Your task is to determine whether the academic work described above makes use of publicly available datasets in its analysis. 
  Respond with only one of the two options: "Uses public data" or "Does not use public data". 

tasks:
  - <TITLE></TITLE><ABSTRACT></ABSTRACT><KEYWORDS></KEYWORDS>
  - <TITLE></TITLE><ABSTRACT></ABSTRACT><KEYWORDS></KEYWORDS>
  - <TITLE></TITLE><ABSTRACT></ABSTRACT><KEYWORDS></KEYWORDS>
  - <TITLE></TITLE><ABSTRACT></ABSTRACT><KEYWORDS></KEYWORDS>
# ============================================= 

tools:
  # Core web tools
  - name: "web_search"
    description: >
      Use this tool when you need to find information that is not already known or may be outdated.
      This includes current events, recent facts, or unknown topics.
      Input should be a clear search query.
      Do NOT use this for simple reasoning or when the answer is already known.

  - name: "web_browser"
    description: >
      Use this tool to open and read the content of a specific webpage when you already have a URL.
      Useful after performing a search.
      Do NOT use this for searching—use web_search first.

  - name: "requests_get"
    description: >
      Use this to retrieve raw content from a specific URL (API, webpage, or endpoint).
      Prefer this for structured or programmatic access.
      Do NOT use for general browsing or search.

  - name: "beautifulsoup_scraper"
    description: >
      Use this to extract structured information from HTML content of a webpage.
      Typically used after fetching a page via web_browser or requests_get.
      Do NOT use if you only need raw text.

  # Knowledge tools
  - name: "wikipedia"
    description: >
      Use this for general knowledge lookups on well-known topics, people, or concepts.
      Faster and more reliable than web_search for encyclopedic content.
      Do NOT use for recent or niche information.

  - name: "arxiv"
    description: >
      Use this to find academic papers in technical or scientific domains.
      Input should be a research topic or keywords.
      Do NOT use for general knowledge or non-academic queries.

  - name: "pubmed"
    description: >
      Use this for biomedical or clinical research queries.
      Input should be medical terms or research questions.
      Do NOT use for general health advice or non-scientific queries.

  # Computation & parsing
  - name: "python_repl"
    description: >
      Use this for calculations, data processing, or executing code.
      Required for precise arithmetic, transformations, or simulations.
      Do NOT use for simple math that can be done mentally.

  - name: "sympy"
    description: >
      Use this for symbolic mathematics such as algebra, equation solving, or simplification.
      Prefer this over python_repl for symbolic operations.

  - name: "json_parser"
    description: >
      Use this to parse, extract, or query structured JSON data.
      Input should be a JSON string and query instructions.
      Do NOT use for plain text.

  # Content extraction
  - name: "pdf_reader"
    description: >
      Use this to extract text from PDF files or PDF URLs.
      Required when the content is not directly readable as text.
      Do NOT use for HTML pages.

  - name: "youtube_transcript"
    description: >
      Use this to retrieve the transcript of a YouTube video.
      Input should be a video URL.
      Do NOT use if you only need metadata or summaries.

  # Utility
  - name: "datetime"
    description: >
      Use this when you need the current date or time.
      Do NOT guess or fabricate current timestamps.

  # Mind2Web-style tools
  - name: "web_interaction"
    description: >
      Use this to interact with web pages in multi-step tasks.
      Includes clicking elements, filling forms, navigating pages, and extracting results.
      Required for tasks involving user workflows on websites.
      Do NOT use for simple retrieval—use web_search or web_browser instead.

  - name: "keyboard_interaction"
    description: >
      Use this for keyboard-based navigation of web interfaces.
      Includes tabbing between elements, pressing enter, typing text, and triggering shortcuts.
      Prefer this when interaction must simulate accessibility or non-mouse workflows.
      Do NOT use for static content extraction.