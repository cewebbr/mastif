experiment:
  name: "WWW 2027"
  description: "Test different framework and protocol combinations."

temperature: 0.7 # Model temperature setting
max_tokens: 1024 # Max tokens per request
max_steps: 3 # Max research iterations per agent workflow
requests_soft_limit: 1000 # Requires user confirmation if exceeded
test_mode: "mind2web"  # Options: "mind2web", "standard"

# Any model ID listed here must be available on HuggingFace or OpenAI
models: 
  # - "gpt-4o"
  # - "meta-llama/Llama-3.3-70B-Instruct"
  # - "meta-llama/Llama-4-Scout-17B-16E-Instruct"
  - "deepseek-ai/DeepSeek-V3.2"  
  # - "openai/gpt-oss-120b"

# ====== Used only in MIND2WEB test mode ====== 
# judge_model: "gpt-4o"
judge_model: "gpt-4o-mini"
# ============================================= 

protocols:
  - "STANDARD"
  # - "MCP"
  # - "A2A"
  # - "ACP"

frameworks:
  - "CrewAI"
  - "Smolagents"
  - "LangChain"
  - "LangGraph"
  - "LlamaIndex"
  - "SemanticKernel"

# ====== Used only in MIND2WEB test mode ====== 
mind2web_num_tasks: 2 # Set to 2350 to run all tasks from the benchmark
# ============================================= 

# ====== Used only in STANDARD test mode ====== 
# prompt_template: |
#   {task}

# tasks:
#   - Look for dissertations and thesis published in Brazil about open data and open research in which datasets were published with research results.
#   - Look for technical reports published in Brazil about open data and open research in which datasets were published with research results.
#   - Look for blog posts published in Brazil about open data and open research in which datasets were published with research results.
# ============================================= 

tools:
  - name: "web_search"
    description: "Search the web using DuckDuckGo"
  - name: "web_browser"
    description: "Navigate a headless browser to a URL and return page text"
  - name: "wikipedia"
    description: "Look up a topic on Wikipedia and return a short summary"
  - name: "arxiv"
    description: "Search academic papers on arXiv"
  - name: "python_repl"
    description: "Execute a snippet of Python code in a sandboxed environment"
  - name: "requests_get"
    description: "Perform an HTTP GET request to a URL and return the response text"
  - name: "beautifulsoup_scraper"
    description: "Extract structured HTML content from a URL"
  - name: "pdf_reader"
    description: "Extract text content from a PDF file or URL"
  - name: "datetime"
    description: "Return the current UTC date and time"
  - name: "json_parser"
    description: "Parse and query a JSON string"
  - name: "pubmed"
    description: "Search biomedical literature on PubMed"
  - name: "youtube_transcript"
    description: "Retrieve the transcript of a YouTube video"
  - name: "sympy"
    description: "Evaluate or simplify a symbolic mathematical expression"
  - name: "web_interaction"
    description: "Interact with web pages in a more flexible way, allowing for complex navigation and data extraction (custom tool to encompass Mind2Web-style tasks)"
  - name: "keyboard_interaction"
    description: "Keyboard-driven browser interaction optimized for accessibility-style tasks (custom tool to encompass Mind2Web-style tasks)"